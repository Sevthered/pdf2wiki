version: 2
updates:
  # Python dependencies declared in pyproject.toml (runtime + dev group).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Pinned GitHub Actions (keeps the SHA pins current; Dependabot updates the SHA + comment).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # Keep upload/download-artifact as a matched v4 pair. Their major bumps only run in publish.yml
      # (never exercised by PR CI) and mixing majors risks a broken Trusted-Publishing release; bump
      # both together, deliberately, and verify at a release if ever needed.
      - dependency-name: "actions/upload-artifact"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/download-artifact"
        update-types: ["version-update:semver-major"]
