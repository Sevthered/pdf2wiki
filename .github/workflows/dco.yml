name: DCO

# Enforce the Developer Certificate of Origin: every non-merge commit in a pull request must carry a
# `Signed-off-by:` trailer (git commit -s). See CONTRIBUTING.md -> "Sign your work (DCO)".

on:
  pull_request:

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
      - name: Verify every commit is signed off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          missing=0
          for sha in $(git rev-list --no-merges "$BASE_SHA".."$HEAD_SHA"); do
            # Bots (e.g. Dependabot) author commits without a sign-off; exempt them.
            case "$(git show -s --format=%ae "$sha")" in
              *"[bot]"*) continue ;;
            esac
            if ! git show -s --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "::error::Commit $sha is missing a Signed-off-by line (DCO)."
              git show -s --format='  %h %s' "$sha"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "All commits must be signed off: git commit -s (amend the last one with git commit --amend -s)."
            echo "See CONTRIBUTING.md -> Sign your work (DCO)."
            exit 1
          fi
          echo "DCO OK: every commit is signed off."
