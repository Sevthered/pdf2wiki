version: 2
updates:
  # Python dependencies declared in pyproject.toml (runtime + dev group).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Pinned GitHub Actions (keeps the SHA pins current; Dependabot updates the SHA + comment).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
