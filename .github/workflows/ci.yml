name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    # Linux-only: conversion requires Linux + NVIDIA; the test suite is pure-Python and GPU-free,
    # so it runs here without a GPU (the MinerU/cloud boundaries are faked in the tests).
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run reuse lint  # REUSE 3.3: every file has SPDX copyright + license info
      - run: uv run mypy  # strict; config in pyproject [tool.mypy], src is strict-clean
      - run: uv run pytest -q --cov=pdf2wiki --cov-report=xml --cov-report=term-missing
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        if: matrix.python-version == '3.13'  # upload once, not per matrix leg
        with:
          token: ${{ secrets.CODECOV_TOKEN }}  # optional for a public repo; set for reliable uploads
          files: ./coverage.xml
          fail_ci_if_error: false  # a Codecov hiccup must not red the build
